<app-header></app-header>
<main>
  <div id="dashboard">
    <app-dashboard-item
      class="status"
      [image]="{ src: 'status.png', alt: 'A signal symbol' }"
      title="Server Status"
    >
      <app-server-status></app-server-status>
    </app-dashboard-item>

    <app-dashboard-item
      class="traffic"
      [image]="{ src: 'globe.png', alt: 'A globe' }"
      title="Traffic"
    >
      <app-traffic></app-traffic>
    </app-dashboard-item>

    <app-dashboard-item
      class="tickets"
      [image]="{ src: 'list.png', alt: 'A list of items' }"
      title="Support Tickets"
    >
      <app-tickets></app-tickets>
    </app-dashboard-item>
  </div>
</main>
