<form id="new-ticket">
  <app-control label="Title" labelFor="title">
    <input type="text" name="title" id="title" />
  </app-control>
  <app-control label="Request" labelFor="request">
    <textarea type="text" name="request" id="request" rows="3"></textarea>
  </app-control>
  <p>
    <button appButton>Submit <span ngProjectAs="icon">⌲</span></button>
  </p>
</form>
